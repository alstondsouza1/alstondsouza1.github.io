<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teachable Machine App</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
        text-align: center;
        transition: background-color 0.3s ease;
      }
      #webcam-container canvas {
        display: none;
        border-radius: 8px;
      }
      #webcam-container.active canvas {
        display: block;
        margin: 0 auto;
      }
      #label-container div {
        font-size: 1.1rem;
        padding: 0.25rem 0;
      }
      button {
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        color: white;
        background: #2563eb;
        margin: 1rem 0;
      }
      button.stop {
        background: #dc2626;
      }
      button:hover {
        opacity: 0.9;
      }
      button:disabled { background: #9ca3af; cursor: not-allowed; }

      #detected {
        margin-top: 1rem;
        font-size: 1.5rem;
        font-weight: bold;
        color: #2563eb;
        min-height: 2rem;
      }

      #game-area {
        display: none;
        margin-top: 1rem;
      }

      .versus {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        font-size: 1.5rem;
        margin: 1rem 0;
      }

      .versus-label {
        font-size: 0.9rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }

      .player-side { text-align: center; }

      #vs-text {
        font-size: 1.5rem;
        font-weight: bold;
        color: #6b7280;
      }

      #result {
        font-size: 2rem;
        font-weight: bold;
        min-height: 2.5rem;
        margin: 0.5rem 0;
      }
      #result.win  { color: #16a34a; }
      #result.lose { color: #dc2626; }
      #result.tie  { color: #d97706; }

      #score {
        font-size: 1.1rem;
        color: #374151;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <p>Show your hand to the camera, then lock in your move!</p>

    <div class="buttons">
      <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>
    </div>

    <div id="detected">Waiting for camera to start</div>
    <button id="lock-btn" onclick="lockIn()" disabled>Lock In Your Answer</button>


    <div id="webcam-container"></div>

    <div id="game-area">
      <div class="versus">
        <div class="player-side">
          <div id="player-guess">❓</div>
          <div class="versus-label">You</div>
        </div>
        <div id="vs-text">VS</div>
        <div class="player-side">
          <div id="cpu-guess">❓</div>
          <div class="versus-label">Computer</div>
        </div>
      </div>
      <div id="result"></div>
    </div>

    <div id="score">Wins: 0 | Losses: 0 | Ties: 0</div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
      const URL = "https://teachablemachine.withgoogle.com/models/4ki_Ofmuw/";

      let model, webcam, labelContainer, maxPredictions;
      let isRunning = false;
      let currentDetected = null;
      let score = { wins: 0, losses: 0, ties: 0 };

      const MOVES = ["Rock", "Paper", "Scissors"];

      function beats(a, b) {
        return (a === "Rock" && b === "Scissors") ||
               (a === "Scissors" && b === "Paper") ||
               (a === "Paper" && b === "Rock");
      }

      let pendingMove = null;

      async function init() {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();

        const container = document.getElementById("webcam-container");
        container.innerHTML = "";
        container.appendChild(webcam.canvas);
        container.classList.add("active");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          labelContainer.appendChild(document.createElement("div"));
        }

        isRunning = true;
        window.requestAnimationFrame(loop);
      }

      async function loop() {
        if (!isRunning) return;
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
      }

      async function predict() {
        const prediction = await model.predict(webcam.canvas);

        // Find the class with the highest probability
        let topClass = prediction[0];
        for (let i = 1; i < prediction.length; i++) {
          if (prediction[i].probability > topClass.probability) {
            topClass = prediction[i];
          }
        }

        const detectedEl = document.getElementById("detected");
        const lockBtn = document.getElementById("lock-btn");

        if (topClass.className !== "Background" && topClass.probability > 0.75) {
          currentDetected = topClass.className;
          detectedEl.textContent = `Detected: ${topClass.className}. Is this your move?`;
          lockBtn.disabled = false;
        } else {
          currentDetected = null;
          detectedEl.textContent = "Show Rock, Paper, or Scissors";
          lockBtn.disabled = true;
        }

        for (let i = 0; i < maxPredictions; i++) {
          labelContainer.childNodes[i].innerHTML =
            prediction[i].className + ": " + prediction[i].probability.toFixed(2);
        }
      }

      function lockIn() {
        if (!currentDetected || currentDetected === "Background") return;

        const playerMove = currentDetected;
        
        // Select random move for mocking CPU
        const cpuMove = MOVES[Math.floor(Math.random() * MOVES.length)];

        document.getElementById("player-guess").textContent = playerMove;
        document.getElementById("cpu-guess").textContent = cpuMove;
        document.getElementById("detected").textContent = `You played: ${playerMove}`;
        document.getElementById("game-area").style.display = "block";

        const resultEl = document.getElementById("result");
        if (playerMove === cpuMove) {
          resultEl.textContent = "It's a Tie!";
          resultEl.className = "tie";
          score.ties++;
        } else if (beats(playerMove, cpuMove)) {
          resultEl.textContent = "You Win!";
          resultEl.className = "win";
          score.wins++;
        } else {
          resultEl.textContent = "You Lose";
          resultEl.className = "lose";
          score.losses++;
        }

        document.getElementById("score").textContent =
          `Wins: ${score.wins} | Losses: ${score.losses} | Ties: ${score.ties}`;
      }

      async function toggleCamera() {
        const button = document.getElementById("toggleButton");
        if (!isRunning) {
          await init();
          button.textContent = "Stop Camera";
          button.classList.add("stop");
        } else {
          isRunning = false;
          webcam.stop();
          document.getElementById("webcam-container").classList.remove("active");
          document.getElementById("detected").textContent = "Waiting for camera to start";
          document.getElementById("lock-btn").disabled = true;
          document.getElementById("game-area").style.display = "none";
          document.getElementById("result").textContent = "";
          currentDetected = null;
          button.textContent = "Start Camera";
          button.classList.remove("stop");
        }
      }
    </script>
  </body>
</html>
